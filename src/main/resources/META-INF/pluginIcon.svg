<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <!-- Eye almond — conveys careful attention, reviewing, looking closely. -->
    <path d="M 4 20 Q 20 4, 36 20 Q 20 36, 4 20 Z" fill="#3574F0"/>
    <!-- Iris ring: subtle depth, reads as a pupil behind the check. -->
    <circle cx="20" cy="20" r="8.5" fill="#1E58C8" opacity="0.35"/>
    <!-- Check as pupil — reviewed / confirmed. -->
    <path d="M 13.5 20.5 L 18 25 L 27 13"
          fill="none" stroke="#ffffff" stroke-width="3.2"
          stroke-linecap="round" stroke-linejoin="round"/>
</svg>
