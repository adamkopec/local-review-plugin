name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (IDE ${{ matrix.ide-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ide-version: ['2024.1', '2024.2', '2024.3']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v5
      - name: Run tests
        env:
          IDE_VERSION: ${{ matrix.ide-version }}
        run: ./gradlew test "-PplatformVersion=$IDE_VERSION"
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report-${{ matrix.ide-version }}
          path: build/reports/tests/test/
          if-no-files-found: ignore

  verify-plugin:
    name: Plugin Verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v5
      - name: Build plugin
        run: ./gradlew buildPlugin
      - name: Run plugin verifier
        run: ./gradlew verifyPlugin
      - name: Upload verifier report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: verifier-report
          path: build/reports/pluginVerifier/
          if-no-files-found: ignore
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v5
        with:
          name: plugin-distribution
          path: build/distributions/*.zip

  ui-tests:
    name: Remote Robot UI smoke tests
    runs-on: ubuntu-latest
    # UI tests are slow and a bit flaky; don't let them gate merges. If you want strict
    # enforcement, remove this line.
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v5

      # IntelliJ needs a display server; Xvfb gives us a virtual one on headless runners.
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Warm the Gradle caches / download the IDE distribution before starting it under
      # Xvfb; the first call to any intellij-platform task is slow and we don't want
      # the readiness-poll below to time out on the initial download.
      - name: Prepare IDE distribution
        run: ./gradlew :prepareSandbox_runIdeForUiTests --no-daemon

      - name: Start IDE under Xvfb
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          echo $! > xvfb.pid
          # Launch in background and redirect logs so we can attach them on failure.
          nohup ./gradlew :runIdeForUiTests --no-daemon > ide.log 2>&1 &
          echo $! > ide.pid

      - name: Wait for Remote Robot to be reachable
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8082 > /dev/null 2>&1; then
              echo "Remote Robot is up (after ${i} tries)"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for Remote Robot on port 8082"
          exit 1

      - name: Run UI tests
        run: ./gradlew :uiTest --no-daemon

      - name: Stop IDE
        if: always()
        run: |
          if [ -f ide.pid ]; then kill "$(cat ide.pid)" 2>/dev/null || true; fi
          if [ -f xvfb.pid ]; then kill "$(cat xvfb.pid)" 2>/dev/null || true; fi

      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ui-test-report
          path: build/reports/tests/uiTest/
          if-no-files-found: ignore

      - name: Upload IDE log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ui-test-ide-log
          path: |
            ide.log
            build/idea-sandbox/**/log/idea.log
          if-no-files-found: ignore

      - name: Upload Remote Robot screenshots (if captured)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ui-test-screenshots
          path: |
            build/screenshots/**
            build/reports/uiTest/**
          if-no-files-found: ignore

  coverage:
    name: Kover coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v5
      - name: Generate coverage report
        run: ./gradlew koverXmlReport
      - name: Verify coverage thresholds
        run: ./gradlew koverVerify
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: kover-report
          path: build/reports/kover/
          if-no-files-found: ignore
