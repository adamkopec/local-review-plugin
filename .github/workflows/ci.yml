name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (IDE ${{ matrix.ide-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ide-version: ['2024.1', '2024.2', '2024.3']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        env:
          IDE_VERSION: ${{ matrix.ide-version }}
        run: ./gradlew test "-PplatformVersion=$IDE_VERSION"
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.ide-version }}
          path: build/reports/tests/test/
          if-no-files-found: ignore

  verify-plugin:
    name: Plugin Verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build plugin
        run: ./gradlew buildPlugin
      - name: Run plugin verifier
        run: ./gradlew verifyPlugin
      - name: Upload verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-report
          path: build/reports/pluginVerifier/
          if-no-files-found: ignore
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip

  coverage:
    name: Kover coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate coverage report
        run: ./gradlew koverXmlReport
      - name: Verify coverage thresholds
        run: ./gradlew koverVerify
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: build/reports/kover/
          if-no-files-found: ignore
