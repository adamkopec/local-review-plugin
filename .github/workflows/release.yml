name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*-*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check tag matches pluginVersion
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=$(sed -n 's/^pluginVersion[[:space:]]*=[[:space:]]*//p' gradle.properties | tr -d '[:space:]')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag $TAG does not match pluginVersion $VERSION in gradle.properties."
            echo "::error::Either retag with $VERSION, or bump pluginVersion to $TAG and re-push the tag."
            exit 1
          fi

      - name: Run Tests
        run: ./gradlew check

      - name: Verify Plugin
        run: ./gradlew verifyPlugin

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NOTES=$(awk -v v="$TAG" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | awk 'NF {p=1} p')
          {
            echo "body<<__END_OF_NOTES__"
            echo "$NOTES"
            echo "__END_OF_NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Local Review ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: build/distributions/*.zip
